services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-behavior-api
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: student-behavior-web
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend
